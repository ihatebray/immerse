<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Immersive</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    #root { width: 100vw; height: 100vh; }

    /* Force crisp text rendering inside backdrop-filter containers.
       Chromium can degrade text quality when backdrop-filter is active;
       backface-visibility: hidden forces a clean compositing layer. */
    [style*="backdrop-filter"] {
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
    }

    /* Custom scrollbars — thin, glass-aesthetic, fade in on hover */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      border: 2px solid transparent;
      background-clip: content-box;
      transition: background 0.2s ease;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.22);
      background-clip: content-box;
    }
    ::-webkit-scrollbar-thumb:active {
      background: rgba(255, 255, 255, 0.32);
      background-clip: content-box;
    }
    ::-webkit-scrollbar-corner {
      background: transparent;
    }
    /* Firefox fallback */
    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.12) transparent;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/renderer.jsx"></script>
</body>
</html>
